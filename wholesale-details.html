<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configure Bundle | Elite Wholesale</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="js/main.js" defer></script>
    <style>
        .configurator-wrapper {
            padding: 180px 0 100px;
            background: #ffffff;
        }

        .config-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 80px;
            align-items: flex-start;
        }

        .bundle-summary-card {
            position: sticky;
            top: 140px;
            background: #fcfcfc;
            padding: 40px;
            border-radius: 32px;
            border: 1px solid rgba(0,0,0,0.03);
            text-align: left;
        }

        .config-table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0 12px;
            text-align: left;
        }

        .config-table th {
            padding: 15px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-muted);
        }

        .config-table td {
            padding: 20px;
            background: #f8f8f8;
            border-top: 1px solid rgba(0,0,0,0.03);
            border-bottom: 1px solid rgba(0,0,0,0.03);
        }

        .config-table td:first-child { border-left: 1px solid rgba(0,0,0,0.03); border-radius: 12px 0 0 12px; }
        .config-table td:last-child { border-right: 1px solid rgba(0,0,0,0.03); border-radius: 0 12px 12px 0; }

        .qty-input {
            width: 80px;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.08);
            background: white;
            text-align: center;
            font-weight: 700;
            font-family: inherit;
        }

        .bundle-progress {
            margin: 30px 0;
            background: #eee;
            height: 12px;
            border-radius: 100px;
            overflow: hidden;
            position: relative;
        }

        .progress-bar {
            background: var(--accent);
            height: 100%;
            width: 0%;
            transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .status-pill {
            display: flex;
            justify-content: space-between;
            font-size: 13px;
            font-weight: 800;
            margin-bottom: 10px;
        }

        @media (max-width: 1024px) {
            .config-grid { grid-template-columns: 1fr; }
            .bundle-summary-card { position: static; }
        }
    </style>
</head>
<body style="background: #ffffff;">
    <header>
        <div class="container" style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
            <a href="index.html" class="logo">ELITE <span>WHOLESALE</span></a>
            <nav class="nav-links">
                <a href="index.html">Home</a>
                <a href="shop.html">Shop</a>
                <a href="wholesale.html" class="active">Wholesale</a>
                <a href="about.html">About</a>
                <a href="contact.html">Contact</a>
            </nav>
            <div style="font-size: 20px;">
                <a href="cart.html"><i class="fa-solid fa-shopping-bag"></i></a>
            </div>
        </div>
    </header>

    <div class="configurator-wrapper">
        <div class="container">
            <div id="bundle-config">
                <!-- Content will be injected by JS -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="container">
            <div class="footer-grid">
                <div class="footer-col">
                    <a href="index.html" class="logo" style="color: white; margin-bottom: 24px;">ELITE<span>WHOLESALE</span></a>
                    <p>Connecting Ghanaian entrepreneurs with world-class premium fashion supply chains.</p>
                </div>
            </div>
            <div class="footer-bottom">
                <p>&copy; 2026 Elite Wholesale. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/products.js"></script>
    <script src="js/cart.js"></script>
    <script>
        const configContainer = document.getElementById('bundle-config');
        const urlParams = new URLSearchParams(window.location.search);
        const bundleId = urlParams.get('id') || 'bundle-1';
        const bundle = wholesaleBundles.find(b => b.id === bundleId);

        let currentSelections = {};

        function initConfig() {
            if (!bundle) return;
            
            configContainer.innerHTML = `
                <div class="hero-tag" style="margin-bottom: 25px; border-color: var(--accent); color: var(--accent);">
                    ⚡ ELITE BUNDLE CONFIGURATOR
                </div>
                <h1 style="font-size: 48px; letter-spacing: -2px; margin-bottom: 60px;">Customize Your <span>${bundle.title}</span></h1>

                <div class="config-grid">
                    <!-- Left: Summary -->
                    <div class="bundle-summary-card">
                        <h3 style="font-size: 24px; margin-bottom: 20px; color: var(--text-main);">${bundle.title}</h3>
                        <p style="color: var(--text-muted); font-size: 15px; margin-bottom: 30px;">
                            Distribute your <strong>${bundle.count} pieces</strong> across any size and color combination in our elite inventory.
                        </p>

                        <div class="status-pill">
                            <span>TOTAL SELECTED</span>
                            <span id="total-count">0 / ${bundle.count}</span>
                        </div>
                        <div class="bundle-progress">
                            <div class="progress-bar" id="progress-bar"></div>
                        </div>

                        <div style="font-size: 32px; font-weight: 800; color: var(--accent); margin-bottom: 30px;" id="config-price">
                            GH₵${bundle.price.toLocaleString()}
                        </div>

                        <button id="add-bundle-btn" class="btn-tracking" disabled style="width: 100%; opacity: 0.3; cursor: not-allowed; border-radius: 12px; padding: 22px;">
                            COMPLETE CONFIGURATION
                        </button>
                    </div>

                    <!-- Right: Table -->
                    <div class="config-table-wrapper">
                        <table class="config-table">
                            <thead>
                                <tr>
                                    <th>Style & Color</th>
                                    <th>Sizes (S - XL)</th>
                                    <th>Allocated Qty</th>
                                </tr>
                            </thead>
                            <tbody id="config-rows">
                                <!-- Generated Rows -->
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            renderRows();
        }

        const colors = ['White', 'Black', 'Grey', 'Navy'];
        const sizes = ['S', 'M', 'L', 'XL'];

        function renderRows() {
            const tbody = document.getElementById('config-rows');
            tbody.innerHTML = colors.map(color => `
                <tr>
                    <td>
                        <div style="display: flex; align-items: center; gap: 15px;">
                            <div style="width: 24px; height: 24px; border-radius: 50%; background: ${color.toLowerCase() === 'white' ? '#fff' : color.toLowerCase()}; border: 1px solid #ddd;"></div>
                            <span style="font-weight: 700;">${color} Elite Blank</span>
                        </div>
                    </td>
                    <td>
                        <div style="display: flex; gap: 10px; align-items: flex-end;">
                            ${sizes.map(size => {
                                const key = `${color}-${size}`;
                                return `
                                    <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                                        <span style="font-size: 10px; font-weight: 800; color: var(--accent); letter-spacing: 1px;">${size}</span>
                                        <input type="number" class="qty-input" min="0" 
                                            onchange="updateAllocation('${key}', this.value)" value="${currentSelections[key] || 0}">
                                    </div>
                                `;
                            }).join('')}
                        </div>
                    </td>
                    <td id="row-total-${color}" style="font-weight: 800; color: var(--text-main); font-size: 18px;">0</td>
                </tr>
            `).join('');
        }

        function updateAllocation(key, val) {
            currentSelections[key] = parseInt(val) || 0;
            
            // Calc totals
            let total = 0;
            colors.forEach(c => {
                let rowTotal = 0;
                sizes.forEach(s => {
                    rowTotal += currentSelections[`${c}-${s}`] || 0;
                });
                document.getElementById(`row-total-${c}`).textContent = rowTotal;
                total += rowTotal;
            });

            const countLabel = document.getElementById('total-count');
            const progressBar = document.getElementById('progress-bar');
            const btn = document.getElementById('add-bundle-btn');

            countLabel.textContent = `${total} / ${bundle.count}`;
            const percent = Math.min((total / bundle.count) * 100, 100);
            progressBar.style.width = `${percent}%`;

            if (total === bundle.count) {
                btn.disabled = false;
                btn.style.opacity = '1';
                btn.style.cursor = 'pointer';
                btn.onclick = handleAddBundle;
            } else {
                btn.disabled = true;
                btn.style.opacity = '0.3';
                btn.style.cursor = 'not-allowed';
            }
        }

        function handleAddBundle() {
            const bundleToCart = {
                id: bundle.id,
                name: `${bundle.title} (Custom Mix)`,
                price: bundle.price,
                image: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?auto=format&fit=crop&q=80&w=800',
                description: `Breakdown: ${Object.entries(currentSelections).filter(([k,v]) => v > 0).map(([k,v]) => `${k} x${v}`).join(', ')}`,
                size: 'Bulk Mix',
                color: 'Customized'
            };
            
            cartManager.addItem(bundleToCart, 1);
            window.location.href = 'cart.html';
        }

        initConfig();
    </script>
</body>
</html>
